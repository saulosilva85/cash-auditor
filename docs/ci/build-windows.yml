name: build-windows-exe

# Gera o cash_auditor.exe no Windows e disponibiliza para download.
# - Em cada push/PR: o .exe fica como "artifact" do run (aba Actions).
# - Em tags vX.Y.Z: o .exe também é anexado a uma Release.
on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r packaging/requirements-build.txt

      - name: Compilar cash_auditor.exe
        run: pyinstaller packaging/cash_auditor.spec --noconfirm

      - name: Smoke test do executável
        shell: pwsh
        run: |
          $env:CASH_AUDITOR_NO_BROWSER = "1"
          $proc = Start-Process -FilePath ".\dist\cash_auditor.exe" -PassThru
          $ok = $false
          for ($i = 0; $i -lt 30; $i++) {
            Start-Sleep -Seconds 1
            try {
              $resp = Invoke-WebRequest -Uri "http://127.0.0.1:8000/api/health" -UseBasicParsing -TimeoutSec 3
              if ($resp.StatusCode -eq 200) { $ok = $true; break }
            } catch { }
          }
          Stop-Process -Id $proc.Id -Force
          if (-not $ok) { Write-Error "Executável não respondeu em /api/health"; exit 1 }
          Write-Host "OK: cash_auditor.exe subiu e respondeu /api/health"

      - name: Publicar artifact (download na aba Actions)
        uses: actions/upload-artifact@v4
        with:
          name: cash_auditor-exe
          path: dist/cash_auditor.exe
          if-no-files-found: error

      - name: Anexar à Release (apenas em tags vX.Y.Z)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/cash_auditor.exe
